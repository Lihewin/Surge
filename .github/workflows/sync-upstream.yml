name: Sync Upstream

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [upstream_updated]

permissions:
  contents: write

jobs:
  sync:
    name: Sync from Upstream
    runs-on: ubuntu-24.04
    outputs:
      has_new_commits: ${{ steps.sync.outputs.has_new_commits }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Configure Merge Driver
        run: |
          git config merge.ours.driver true

      - name: Sync with upstream
        id: sync
        env:
          UPSTREAM_REPO: SukkaW/Surge
          UPSTREAM_BRANCH: master
        run: |
          set -euo pipefail

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" 2>/dev/null \
            || git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"

          BEFORE="$(git rev-parse HEAD)"

          if ! git merge "upstream/${UPSTREAM_BRANCH}" -X theirs --no-edit; then
            echo "Merge failed; resolve conflicts or update .gitattributes"
            git merge --abort 2>/dev/null || true
            exit 1
          fi

          # Upstream-only workflows (Sukka dist infra). Fork CI stays in .gitattributes merge=ours.
          UPSTREAM_ONLY_WORKFLOWS=(
            .github/workflows/toggle-dist-repo-visibility.yml
          )
          REMOVED=0
          for f in "${UPSTREAM_ONLY_WORKFLOWS[@]}"; do
            if [ -e "$f" ]; then
              git rm -f "$f"
              REMOVED=1
            fi
          done
          if [ "$REMOVED" -eq 1 ]; then
            git commit --amend --no-edit
          fi

          AFTER="$(git rev-parse HEAD)"
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "has_new_commits=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream."
          else
            git push origin HEAD:master
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            echo "Synced upstream and pushed."
          fi

  trigger_build:
    needs: sync
    if: needs.sync.outputs.has_new_commits == 'true'
    name: Trigger Build Workflow
    runs-on: ubuntu-24.04
    steps:
      - name: Trigger main workflow
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'main.yml',
              ref: 'master'
            });
            console.log('✅ Triggered main workflow');
